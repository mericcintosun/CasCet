name: Publish to npm

# Publishes the public packages (@cascet/core, @cascet/client, @cascet/gateway,
# and the `cascet` CLI) to npm. Private packages (servers, dashboard, e2e, agent,
# discord-setup) are skipped automatically by pnpm.
#
# Auth: a repo secret NPM_TOKEN (npm Automation token — bypasses 2FA).
# Trigger: the "Run workflow" button (workflow_dispatch) or pushing a v* tag.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Authenticate to npm (trim + verify)
        run: |
          TOKEN="$(printf '%s' "${NPM_TOKEN}" | tr -d '[:space:]')"
          printf '//registry.npmjs.org/:_authToken=%s\nregistry=https://registry.npmjs.org/\n' "$TOKEN" > "$HOME/.npmrc"
          echo "trimmed token length: ${#TOKEN} (a classic npm token is ~40 chars)"
          if who="$(npm whoami 2>&1)"; then
            echo "authenticated as: $who"
            echo "--- org membership (cascet) ---"
            npm org ls cascet 2>&1 | head -20 || true
          else
            echo "::error::npm auth failed ($who). The NPM_TOKEN secret is not a valid npm token — regenerate a Classic > Automation token on npmjs.com and re-add it as NPM_TOKEN (paste into the *Secret* field, no spaces/newlines)."
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish new versions only (in dependency order)
        run: |
          set -euo pipefail
          for dir in packages/core packages/client packages/gateway packages/cli; do
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "= $name@$ver already on npm — skipping"
            else
              echo "+ publishing $name@$ver"
              ( cd "$dir" && pnpm publish --access public --no-git-checks )
            fi
          done

      - name: Clean up credentials
        if: always()
        run: rm -f "$HOME/.npmrc"
